spec: "Mastercard ISO-8583 Spec"
# Globales Encoding: gilt für alle Felder ohne eigenes `encoding`.
# Mastercard verwendet ausschliesslich EBCDIC – kein Feld braucht ein eigenes encoding.
encoding: ebcdic
header: !include hdrWLPFO

fields:
  "000": !include mti
  "001": !include bmap

  "002":
    type: scalar
    format: llchar       # → IFE_LLCHAR (erbt encoding: ebcdic)
    length: 19
    description: "Primary Account Number"

  "003":
    type: nested
    format: binary       # → IF_BINARY  (encoding-neutral, ignoriert globales encoding)
    length: 6
    description: "Processing Code"
    children:
      - type: scalar
        format: nop
        length: 0
      - type: scalar
        format: numeric  # → IFE_NUMERIC (erbt encoding vom Elternfeld = ebcdic)
        length: 2
        description: "Cardholder Transaction Type Code"
      - type: scalar
        format: numeric
        length: 2
        description: "Cardholder 'From Account' Type Code"
      - type: scalar
        format: numeric
        length: 2
        description: "Cardholder 'To Account' Type Code"

  "052":
    type: scalar
    format: binary       # → IF_BINARY  (encoding-neutral, kein encoding nötig)
    length: 8
    description: "PIN Data"

  "055":
    type: scalar
    format: lllbinary    # → IF_LLLBINARY (encoding-neutral)
    length: 255
    description: "ICC / EMV Data"

---
# VISA-Beispiel: Mix aus BCD und EBCDIC
spec: "VISA ISO-8583 Spec"
encoding: ebcdic         # Meiste Felder sind EBCDIC
header: !include hdrWLPFO

fields:
  "000": !include mti
  "001": !include bmap

  "002":
    type: scalar
    format: llchar       # → IFE_LLCHAR (erbt encoding: ebcdic)
    length: 19
    description: "Primary Account Number"

  "004":
    type: scalar
    format: numeric
    encoding: bcd        # Überschreibt globales ebcdic → IFB_NUMERIC
    length: 12
    description: "Amount, Transaction"

  "007":
    type: nested
    format: binary       # encoding-neutral
    length: 10
    description: "Transmission Date and Time"
    children:
      - type: scalar
        format: numeric
        encoding: bcd    # Kind-Feld überschreibt auf BCD → IFB_NUMERIC
        length: 4
        description: "Date"
      - type: scalar
        format: numeric
        encoding: bcd
        length: 6
        description: "Time"

  "052":
    type: scalar
    format: binary       # encoding-neutral
    length: 8
    description: "PIN Data"
