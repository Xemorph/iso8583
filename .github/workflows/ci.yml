name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ── Linux (GCC + Ninja) ────────────────────────────────────────────────────
  build-linux:
    name: Linux / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-13 g++-13 ninja-build libiconv-hook-dev
          echo "CC=gcc-13"  >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV

      - uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '06a7fdd564234908731c59ac46a624f808e87b1c'

      - name: Configure
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DISO8583_BUILD_SHARED=ON
          -DISO8583_ENABLE_ICONV=ON
          -DISO8583_BUILD_TESTS=ON
          -DISO8583_INSTALL=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --no-tests=error \
            --timeout 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7

  # ── Windows (MSVC + Ninja) ─────────────────────────────────────────────────
  build-windows:
    name: Windows / ${{ matrix.build_type }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja --no-progress -y

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '06a7fdd564234908731c59ac46a624f808e87b1c'

      - name: Configure
        shell: cmd
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DISO8583_BUILD_SHARED=ON
          -DISO8583_ENABLE_ICONV=ON
          -DISO8583_BUILD_TESTS=ON
          -DISO8583_INSTALL=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: >
          ctest --test-dir build
          --build-config ${{ matrix.build_type }}
          --output-on-failure
          --no-tests=error
          --timeout 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-${{ matrix.build_type }}
          path: build/Testing/
          retention-days: 7

  # ── Zusammenfassung für Branch-Protection ──────────────────────────────────
  # Settings → Branches → Required status checks: "CI passed"
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [ build-linux, build-windows ]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          linux="${{ needs.build-linux.result }}"
          windows="${{ needs.build-windows.result }}"
          if [ "$linux" != "success" ] || [ "$windows" != "success" ]; then
            echo "Failed: linux=$linux windows=$windows"
            exit 1
          fi
          echo "All jobs passed"
